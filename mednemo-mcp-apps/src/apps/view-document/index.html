<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Viewer — MedNemo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; padding: 1.5rem; }
    .header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.25rem; font-weight: 600; }
    .placeholder { background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 3rem; text-align: center; color: #64748b; }
    .placeholder .icon { font-size: 3rem; margin-bottom: 1rem; }
    .placeholder p { margin-top: 0.5rem; font-size: 0.875rem; }
    .controls { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; }
    .controls button { padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.875rem; }
    .controls button:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📄 Document Viewer</h1>
  </div>
  <div class="placeholder">
    <div class="icon">📑</div>
    <h2>PDF / Image Viewer</h2>
    <p>Zoom, pan, and annotate patient documents.</p>
    <p>This is a placeholder — connect to the backend to load real documents.</p>
    <div class="controls">
      <button>🔍 Zoom In</button>
      <button>🔎 Zoom Out</button>
      <button>🖊️ Annotate</button>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
