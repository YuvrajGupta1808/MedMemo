<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Charts — MedNemo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: 1.5rem;
      line-height: 1.5;
    }
    .header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .header h1 { font-size: 1.25rem; font-weight: 600; }
    .header h1::before { content: '📈'; margin-right: 6px; }
    .lab-type-badge {
      display: inline-block; padding: 4px 12px; background: #dbeafe;
      color: #2563eb; border-radius: 20px; font-size: 13px; font-weight: 500;
      margin-left: 8px;
    }
    #status {
      text-align: center; padding: 3rem; color: #64748b;
      background: #fff; border-radius: 12px; border: 1px solid #e2e8f0;
    }
    #status .spinner { font-size: 2rem; margin-bottom: 0.75rem; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 1.25rem;
    }
    .chart-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 1rem 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .chart-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: #334155; }
    .chart-card .unit { font-size: 0.75rem; color: #94a3b8; font-weight: 400; }
    .chart-card canvas { width: 100% !important; height: 260px !important; }
    .empty-state {
      text-align: center; padding: 3rem; color: #94a3b8;
      background: #fff; border-radius: 12px; border: 2px dashed #cbd5e1;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .error-state {
      text-align: center; padding: 2rem; color: #dc2626;
      background: #fef2f2; border-radius: 12px; border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lab Charts</h1>
    <span class="lab-type-badge" id="labTypeBadge" style="display:none"></span>
  </div>
  <div id="status">
    <div class="spinner">⏳</div>
    <p>Loading lab results…</p>
  </div>
  <div id="charts" class="charts-grid" style="display:none;"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
