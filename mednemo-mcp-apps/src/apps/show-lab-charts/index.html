<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Charts — MedNemo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; padding: 1.5rem; }
    .header h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; }
    .placeholder { background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 3rem; text-align: center; color: #64748b; }
    .placeholder .icon { font-size: 3rem; margin-bottom: 1rem; }
    .chart-area { height: 200px; background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%); border-radius: 8px; margin-top: 1rem; display: flex; align-items: center; justify-content: center; color: #3b82f6; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📈 Lab Charts</h1>
  </div>
  <div class="placeholder">
    <div class="icon">🧪</div>
    <h2>Lab Results Visualization</h2>
    <p>Line charts with normal-range bands for lab values over time.</p>
    <div class="chart-area">
      Chart.js visualization will render here
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
