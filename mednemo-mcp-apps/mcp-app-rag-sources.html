<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Source Explorer</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --border: #e2e6ed;
      --text: #1a1d23;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --highlight: #fef08a;
      --bar-bg: #e5e7eb;
      --bar-fill: #2563eb;
      --bar-high: #16a34a;
      --bar-mid: #eab308;
      --bar-low: #ef4444;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }
    .header {
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1::before {
      content: '🔍';
      font-size: 20px;
    }
    .query-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .answer-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .answer-box .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .answer-box .text {
      font-size: 14px;
      color: var(--text);
    }
    .count-badge {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .source-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 4px;
    }
    .source-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color .15s;
    }
    .source-card:hover {
      border-color: var(--accent);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .doc-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--accent-light);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .doc-info .doc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .doc-info .doc-page {
      font-size: 11px;
      color: var(--text-muted);
    }
    .relevance-section {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 140px;
    }
    .relevance-bar-container {
      flex: 1;
      height: 6px;
      background: var(--bar-bg);
      border-radius: 3px;
      overflow: hidden;
      min-width: 60px;
    }
    .relevance-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .3s ease;
    }
    .relevance-label {
      font-size: 12px;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }
    .card-body {
      padding: 14px 16px;
    }
    .card-body .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .type-pdf { background: #fef2f2; color: #dc2626; }
    .type-transcript { background: #f0fdf4; color: #16a34a; }
    .type-image { background: #eff6ff; color: #2563eb; }
    .chunk-content {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .chunk-content mark {
      background: var(--highlight);
      padding: 1px 2px;
      border-radius: 2px;
    }
    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 4px;
      border: 1px solid var(--border);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>RAG Source Explorer</h1>
    <div class="query-badge" id="queryBadge"></div>
  </div>
  <div class="answer-box" id="answerBox" style="display:none">
    <div class="label">AI Answer</div>
    <div class="text" id="answerText"></div>
  </div>
  <div class="count-badge" id="countBadge"></div>
  <div class="source-list" id="sourceList"></div>

  <script>
    function getBarColor(score) {
      if (score >= 0.7) return 'var(--bar-high)';
      if (score >= 0.4) return 'var(--bar-mid)';
      return 'var(--bar-low)';
    }

    function highlightTerms(text, query) {
      if (!query || !text) return escapeHtml(text || '');
      const terms = query.split(/\s+/).filter(t => t.length > 2);
      if (!terms.length) return escapeHtml(text);
      let result = escapeHtml(text);
      for (const term of terms) {
        const re = new RegExp('(' + escapeRegex(escapeHtml(term)) + ')', 'gi');
        result = result.replace(re, '<mark>$1</mark>');
      }
      return result;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeRegex(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function getTypeClass(type) {
      if (type === 'transcript') return 'type-transcript';
      if (type === 'jpeg' || type === 'png') return 'type-image';
      return 'type-pdf';
    }

    function tryDecodeB64Text(b64) {
      try {
        const raw = atob(b64);
        // Check if it's actually text (not binary image data)
        const first4 = raw.substring(0, 4);
        // JPEG starts with ÿØÿ, PNG starts with ‰PNG
        if (first4.charCodeAt(0) === 0xFF || first4.charCodeAt(0) === 0x89) {
          return null; // It's an image
        }
        return raw;
      } catch { return null; }
    }

    function renderSources(data) {
      const { query, answer, pages } = data;
      document.getElementById('queryBadge').textContent = `"${query}"`;

      if (answer) {
        document.getElementById('answerBox').style.display = 'block';
        document.getElementById('answerText').textContent = answer;
      }

      // Sort by relevance descending
      const sorted = [...pages].sort((a, b) => b.relevance - a.relevance);
      document.getElementById('countBadge').textContent =
        `${sorted.length} source${sorted.length !== 1 ? 's' : ''} found`;

      const list = document.getElementById('sourceList');
      list.innerHTML = '';

      sorted.forEach((page, i) => {
        const card = document.createElement('div');
        card.className = 'source-card';

        const docLabel = page.document_id
          ? page.document_id.substring(0, 12) + '…'
          : 'Unknown';
        const pageLabel = page.document_type === 'transcript'
          ? 'Transcript' : `Page ${page.page_number}`;
        const typeLabel = page.document_type || 'pdf';
        const barWidth = Math.round(page.relevance * 100);
        const barColor = getBarColor(page.relevance);
        const scoreLabel = (page.relevance * 100).toFixed(0) + '%';

        // Try to decode content as text (for transcripts)
        const textContent = page.image_b64
          ? tryDecodeB64Text(page.image_b64) : null;
        const isImage = page.image_b64 && !textContent;

        let bodyHtml = `<span class="type-badge ${getTypeClass(typeLabel)}">${escapeHtml(typeLabel)}</span>`;

        if (textContent) {
          bodyHtml += `<div class="chunk-content">${highlightTerms(textContent, query)}</div>`;
        } else if (isImage) {
          bodyHtml += `<img class="image-preview" src="data:image/jpeg;base64,${page.image_b64}" alt="Page ${page.page_number}" />`;
        } else {
          bodyHtml += `<div class="chunk-content" style="color:var(--text-muted);font-style:italic;">No preview available</div>`;
        }

        card.innerHTML = `
          <div class="card-header">
            <div class="card-meta">
              <div class="doc-icon">${i + 1}</div>
              <div class="doc-info">
                <div class="doc-name">${escapeHtml(docLabel)}</div>
                <div class="doc-page">${escapeHtml(pageLabel)}</div>
              </div>
            </div>
            <div class="relevance-section">
              <div class="relevance-bar-container">
                <div class="relevance-bar" style="width:${barWidth}%;background:${barColor}"></div>
              </div>
              <span class="relevance-label" style="color:${barColor}">${scoreLabel}</span>
            </div>
          </div>
          <div class="card-body">${bodyHtml}</div>
        `;
        list.appendChild(card);
      });
    }

    // MCP App Studio integration: listen for tool result data
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'tool_result') {
        renderSources(event.data.result);
      }
    });

    // Also check for data injected directly on window (mcp-app-studio pattern)
    if (window.__MCP_TOOL_RESULT__) {
      renderSources(window.__MCP_TOOL_RESULT__);
    }

    // Demo/preview mode: render sample data if no MCP data arrives within 500ms
    setTimeout(() => {
      if (document.getElementById('sourceList').children.length === 0 && !window.__MCP_TOOL_RESULT__) {
        renderSources({
          query: 'blood pressure medication history',
          answer: 'The patient has been on Lisinopril 10mg since 2024, with recent adjustment to 20mg due to elevated readings.',
          session_id: 'demo-session',
          pages: [
            { document_id: 'a1b2c3d4-e5f6-7890', page_number: 3, session_id: 'demo', document_type: 'pdf', image_b64: btoa('Patient vitals: Blood pressure 140/90 on admission. Started Lisinopril 10mg daily. Follow-up in 2 weeks recommended. History of hypertension since 2020.'), relevance: 1.0 },
            { document_id: 'a1b2c3d4-e5f6-7890', page_number: 5, session_id: 'demo', document_type: 'pdf', image_b64: btoa('Medication adjustment: Increased Lisinopril to 20mg daily due to persistent elevated blood pressure readings of 145/95. Patient reports compliance with previous dosage.'), relevance: 0.82 },
            { document_id: 'f9e8d7c6-b5a4-3210', page_number: 0, session_id: 'demo', document_type: 'transcript', image_b64: btoa('[00:02:15] Dr. Smith: Looking at the blood pressure trends, I think we should increase the medication. The current dose isn\'t achieving target levels.\n[00:02:30] Patient: I\'ve been taking it every morning as prescribed.'), relevance: 0.65 },
            { document_id: 'b2c3d4e5-f6a7-8901', page_number: 1, session_id: 'demo', document_type: 'pdf', image_b64: btoa('Lab results from March 2026: Creatinine 0.9 mg/dL, BUN 15 mg/dL. Kidney function normal. Safe to continue ACE inhibitor therapy for blood pressure management.'), relevance: 0.48 },
          ],
        });
      }
    }, 500);
  </script>
</body>
</html>
